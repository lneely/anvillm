# goq backend requirements
filesystem:
  rox:
    - "{HOME}/.local/bin"
  rw:
    - "{HOME}/.config/goq"
    - "{XDG_DATA_HOME}/goq"
    - "{HOME}/.local/share/goq"
    - "{HOME}/.kiro"
    - "{HOME}/.aws"
    - "{XDG_DATA_HOME}/kiro-cli"
    - "{CWD}/.kiro"
    - "/dev/tty"
    - "{XDG_RUNTIME_DIR}/superpowerd"
network:
  unrestricted: true
env:
  - GOQ_PROVIDER
  - GOQ_MODEL
  - OPENAI_API_KEY
  - ANTHROPIC_API_KEY
  - GITHUB_TOKEN
  - KIRO_API_KEY
  - SUPERPOWERD_SESSION_TOKEN
  - SUPERPOWERD_SOCKET_DIR
  - XDG_RUNTIME_DIR
