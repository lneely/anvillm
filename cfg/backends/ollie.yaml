# ollie backend requirements
filesystem:
  ro:
    - "{HOME}/.config/ollie"
  rw:
    - "{HOME}/.config/anvillm"
    - "{HOME}/.local/state/ollie"
    - "{HOME}/.cache/ollie"
network:
  unrestricted: true
env:
  - OLLIE_BACKEND
  - OLLIE_MODEL
  - OLLIE_OLLAMA_URL
  - OLLIE_OPENAI_URL
  - OLLIE_OPENAI_KEY
