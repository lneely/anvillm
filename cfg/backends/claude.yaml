# Claude backend requirements
filesystem:
  rw:
    - "{HOME}/.claude"
    - "{HOME}/.mcp.json"
    - "{HOME}/.claude.json"
    - "{HOME}/.config/anvillm"
  rwx:
    - "{HOME}/.claude/hooks"
    - "{HOME}/.config/anvillm/claude"
network:
  unrestricted: true
env:
  - ANTHROPIC_API_KEY
  - CLAUDE_AGENT_NAME=anvillm-agent
  - CLAUDE_CONFIG_DIR
